name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://diffguard:diffguard@localhost:5432/diffguard
      JWT_SECRET: ci-only-jwt-secret-at-least-32-characters
      GITHUB_WEBHOOK_SECRET: ci-only-webhook-secret
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Test backend
        run: bun test
        working-directory: backend

      - name: Typecheck backend
        run: bun run typecheck
        working-directory: backend

      - name: Build backend
        run: bun run build
        working-directory: backend

      - name: Build frontend
        run: bun run build
        working-directory: frontend
