services:
  qwykz-db:
    image: postgres:17-alpine
    container_name: diffguard-backend-postgres
    command: postgres -c synchronous_commit=off
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: qwykz_local_password
      POSTGRES_DB: diffguard-backend
    ports:
      - "127.0.0.1:54519:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d diffguard-backend"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 5s
    volumes:
      - diffguard-backend_data:/var/lib/postgresql/data

  qwykz-redis:
    image: redis:7-alpine
    container_name: diffguard-backend-redis
    command: redis-server --appendonly yes
    ports:
      - "127.0.0.1:63707:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - diffguard-backend_redis_data:/data

volumes:
  diffguard-backend_data:
  diffguard-backend_redis_data:
